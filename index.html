<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>旅行分账</title>
<style>
  /* ============================================================
     设计方向:「克制的高级感」
     参照的是市面上偏"安静"的高端 App 的通用语法:大留白、
     发丝分割线代替大量描边卡片、衬线字只用在少数几个地方做点缀、
     金额用斜体衬线数字(像精品店小票上的价格),不用鲜艳色块、
     不用阴影堆叠、不用旋转贴纸——用排版和留白本身撑住"高级"。
     ============================================================ */
  :root {
    --bg:#F7F7F4; --surface:#FFFFFF;
    --ink:#1B1B16; --sub:#8C8A80; --faint:#C9C6B9; --line:#E6E3D9;
    --accent:#8A6B3E; --accent-ink:#6B5027; --clay:#8C5C4C; --sage:#57614F;
    --mono: ui-monospace,'SF Mono',Consolas,Menlo,monospace;
    --serif: Georgia,'Songti SC','STSong','Noto Serif SC',serif;
  }
  * { box-sizing:border-box; margin:0; }
  body {
    font-family:-apple-system,system-ui,'PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  #app { max-width:520px; margin:0 auto; padding:34px 22px 150px; }
  .num { font-variant-numeric:tabular-nums; }
  .serif { font-family:var(--serif); }

  h1 { font-family:var(--serif); font-size:27px; font-weight:700; letter-spacing:-.01em; }
  h2 { font-size:11px; font-weight:700; letter-spacing:.16em; color:var(--sub); text-transform:uppercase; margin:30px 0 14px; }
  .eb { font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--accent-ink); }
  .muted { color:var(--sub); font-size:13.5px; line-height:1.75; }

  button { font:inherit; border:none; border-radius:10px; cursor:pointer; padding:13px 20px; font-weight:600; }
  .cta { background:var(--ink); color:#fff; width:100%; letter-spacing:.02em; }
  .cta:hover { background:#000; }
  .outline { background:none; border:1px solid var(--line); color:var(--ink); padding:11px 18px; }
  .outline:hover { border-color:var(--faint); }
  .ghost { background:none; color:var(--ink); text-decoration:underline; text-underline-offset:4px;
    text-decoration-color:var(--faint); padding:6px 0; font-weight:500; font-size:13.5px; }
  .icon-btn { background:none; color:var(--sub); padding:4px 6px; font-size:13px; font-weight:500; }

  .surface { background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:20px; margin-bottom:16px; }
  input, select { font:inherit; padding:10px 2px; border:none; border-bottom:1px solid var(--line);
    width:100%; background:transparent; color:var(--ink); border-radius:0; }
  input:focus, select:focus { outline:none; border-bottom-color:var(--ink); }
  label { font-size:10.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--sub);
    display:block; margin:16px 0 4px; }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .row > * { flex:1; }
  .checks { display:flex; flex-wrap:wrap; gap:8px; }
  .checks label { display:flex; align-items:center; gap:5px; margin:0; font-size:13px; letter-spacing:0;
    text-transform:none; color:var(--ink); border:1px solid var(--line); border-radius:999px; padding:6px 12px; font-weight:500; }
  .checks input { width:auto; accent-color:var(--ink); }
  .checks input[type=radio] { position:absolute; opacity:0; width:0; }
  .checks label:has(input[type=radio]:checked) { background:var(--ink); border-color:var(--ink); color:#fff; }
  .checks label:has(input[type=radio]:focus-visible) { outline:2px solid var(--accent); outline-offset:2px; }
  .sv { width:56px; padding:2px 4px; border:none; border-bottom:1px solid var(--faint); }

  .topbar { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .trip-date { font-size:12.5px; color:var(--sub); margin-top:5px; }
  .avatars { display:flex; flex-shrink:0; }
  .av { width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
    background:#fff; color:var(--ink); font-size:11.5px; font-weight:700; border:1.3px solid var(--ink); }
  .avatars .av { margin-left:-7px; } .avatars .av:first-child { margin-left:0; }
  .tag { display:inline-block; color:var(--ink); border:1px solid var(--line); border-radius:999px;
    padding:5px 13px; margin:0 6px 6px 0; font-size:13px; }

  .status { display:flex; justify-content:space-between; align-items:center; padding:15px 2px;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin:16px 0 6px;
    font-size:13.5px; cursor:pointer; }
  .status .arr { color:var(--sub); font-size:12px; }

  .bottombar { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--line);
    z-index:15; padding-bottom:env(safe-area-inset-bottom); }
  .bottombar .bb-in { max-width:520px; margin:0 auto; display:flex; }
  .bottombar button { flex:1; background:none; border-radius:0; padding:15px 0 17px; font-size:13px;
    font-weight:600; color:var(--sub); letter-spacing:.06em; }
  .bottombar button.on { color:var(--ink); box-shadow:inset 0 2px 0 var(--ink); }

  .leader-row { display:flex; align-items:baseline; gap:6px; }
  .leader-row .lbl { white-space:nowrap; }
  .leader-row .ld { flex:1; border-bottom:1px dotted var(--faint); margin:0 2px 4px; min-width:12px; }
  .leader-row .val { white-space:nowrap; font-weight:600; }

  .tl-head { display:flex; justify-content:space-between; align-items:baseline; margin:0 0 4px; }
  .timeline { position:relative; padding-left:18px; margin-top:14px; }
  .tl-line { position:absolute; left:4px; top:5px; bottom:14px; width:1px; background:var(--line); }
  .stop { position:relative; margin-bottom:26px; }
  .stop-dot { position:absolute; left:-18px; top:5px; width:8px; height:8px; border-radius:50%; background:var(--ink); }
  .stop-date { font-size:11px; letter-spacing:.1em; color:var(--sub); text-transform:uppercase; }
  .stop-name { font-family:var(--serif); font-size:18px; font-weight:700; margin-top:2px; }
  .stop-note { font-size:13px; color:var(--sub); margin:4px 0 12px; font-style:italic; }
  .exp-lines { margin-top:4px; }
  .exp-lines .leader-row { font-size:13px; padding:5px 0; }
  .exp-lines .cat-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--accent); margin-right:2px; }

  .fab { position:fixed; bottom:84px; left:50%; transform:translateX(-50%);
    border-radius:999px; padding:14px 24px; font-size:14px; font-weight:600; white-space:nowrap;
    background:var(--ink); color:#fff; z-index:10; box-shadow:0 16px 34px -12px rgba(0,0,0,.4); }
  .stop-add { font-size:12px; color:var(--accent-ink); background:none; border:none; padding:6px 0 0;
    font-weight:600; text-decoration:underline; text-decoration-color:var(--faint); text-underline-offset:3px; }

  .exp-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0;
    border-bottom:1px solid var(--line); gap:10px; }
  .exp-row:last-child { border-bottom:none; }
  .exp-row .who { font-size:12px; color:var(--sub); margin-top:3px; }
  .amt-r { text-align:right; white-space:nowrap; }
  .amt-r .main { font-weight:700; }
  .amt-r .orig { font-size:11.5px; color:var(--sub); }
  .date-h { font-size:11px; letter-spacing:.14em; color:var(--sub); text-transform:uppercase; margin:22px 0 8px; }

  .s2-title { font-family:var(--serif); font-size:24px; font-weight:700; margin-top:4px; }
  .s2-sub { font-size:13px; color:var(--sub); margin:8px 0 8px; }
  .balance-row { padding:13px 0; border-bottom:1px solid var(--line); }
  .balance-row .val.pos { color:var(--accent-ink); }
  .balance-row .val.neg { color:var(--clay); }

  .transfer { padding:20px 0; border-bottom:1px solid var(--line); }
  .transfer .route { display:flex; align-items:baseline; gap:9px; font-size:16px; font-weight:600; }
  .transfer .route .arrow { color:var(--sub); font-weight:400; font-size:14px; }
  .transfer .t-amt { margin-left:auto; font-family:var(--serif); font-style:italic; font-weight:700; font-size:19px; }
  .transfer .t-row { display:flex; align-items:baseline; }
  .t-detail { margin-top:10px; }
  .t-detail summary { font-size:12px; color:var(--sub); cursor:pointer; list-style:none; text-decoration:underline;
    text-decoration-color:var(--faint); text-underline-offset:3px; }
  .t-detail summary::-webkit-details-marker { display:none; }
  .detail-line { font-size:12.5px; color:var(--sub); margin-top:8px; line-height:1.9; }
  .t-actions { margin-top:12px; }
  .stamp { font-size:11.5px; font-weight:700; color:var(--accent-ink); letter-spacing:.1em; text-transform:uppercase;
    border-bottom:1.5px solid var(--accent); padding-bottom:2px; }

  .stat { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:13px; }
  .stat .sl { flex:0 0 78px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--sub); }
  .stat .bar { flex:1; height:2px; background:var(--line); }
  .stat .bar i { display:block; height:100%; background:var(--ink); min-width:2px; }
  .stat .sv2 { flex:0 0 auto; font-size:12.5px; font-weight:600; white-space:nowrap; }
  details.section { margin-bottom:4px; }
  details.section > summary { font-size:13px; font-weight:600; cursor:pointer; list-style:none; padding:11px 0;
    border-bottom:1px solid var(--line); display:flex; justify-content:space-between; }
  details.section > summary::-webkit-details-marker { display:none; }
  details.section > summary::after { content:'＋'; color:var(--sub); font-weight:300; }
  details.section[open] > summary::after { content:'－'; }
  details.section > div { padding:12px 0 6px; }

  .overlay { position:fixed; inset:0; background:rgba(20,19,15,.82); z-index:20; overflow-y:auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:16px; }
  .overlay canvas { display:none; }
  .recap-card { width:min(320px,92vw); background:linear-gradient(165deg,#232019,#171512);
    border-radius:6px; overflow:hidden; padding:28px 26px 24px; color:#F3EFE4;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.9); }
  .recap-title { font-family:var(--serif); font-style:italic; font-size:23px; font-weight:700; color:#fff; }
  .recap-sub { font-size:11.5px; letter-spacing:.14em; color:#B8A98A; margin-top:6px; text-transform:uppercase; }
  .recap-rule { height:1px; background:var(--accent); margin:20px 0; opacity:.6; }
  .recap-stats { display:flex; justify-content:space-between; }
  .stat-box { text-align:center; }
  .stat-num { font-family:var(--serif); font-size:24px; font-weight:700; }
  .stat-lb { font-size:10px; color:#B8A98A; margin-top:3px; letter-spacing:.1em; text-transform:uppercase; }
  .recap-total { text-align:center; font-size:12px; color:#B8A98A; margin-top:20px; letter-spacing:.08em; text-transform:uppercase; }
  .recap-total b { font-family:var(--serif); font-style:italic; color:#fff; font-size:19px; display:block; margin-top:4px; letter-spacing:0; text-transform:none; }
  .recap-facts { margin-top:20px; display:flex; flex-direction:column; gap:12px; }
  .recap-fact { font-size:12px; color:#E3DCC8; padding-left:12px; border-left:1.5px solid var(--accent); line-height:1.6; }
  .recap-stamp { margin-top:20px; text-align:right; font-size:10.5px; letter-spacing:.16em; color:var(--accent);
    text-transform:uppercase; border-top:1px solid rgba(255,255,255,.15); padding-top:12px; }

  .hero { padding:2px 0 26px; }
  .hero h1 { margin-top:8px; }
  .hero p { margin-top:8px; }
  .trip-row { padding:18px 0; border-bottom:1px solid var(--line); cursor:pointer; }
  .trip-row .t-name { font-family:var(--serif); font-size:18px; font-weight:700; }
  .trip-row .t-meta { font-size:12px; color:var(--sub); margin-top:4px; }
  .trip-row .t-total { font-weight:600; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
const LS = 'travel-split-v1';
let db = JSON.parse(localStorage.getItem(LS) || '{"trips":[]}');
function migratePayers(db) {
  db.trips.forEach(t => t.expenses.forEach(e => {
    if (!e.payers && e.payerId) { e.payers = { [e.payerId]: e.mainCents }; delete e.payerId; }
  }));
}
function migrateIds(db) {
  db.trips.forEach(t => (t.settlements || []).forEach(s => { if (!s.id) s.id = uid(); }));
}
migratePayers(db);
migrateIds(db);
let view = { screen:'list', tripId:null, tab:'timeline', showForm:false, presetStopId:'', showStopForm:false, showRecap:false, showNewTrip:false };
const save = () => { localStorage.setItem(LS, JSON.stringify(db)); pushChanges(trip()); };
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const esc  = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const trip = () => db.trips.find(t => t.id === view.tripId);
const fmt  = c => (c/100).toFixed(2);
const mname = (t,id) => (t.members.find(m => m.id === id) || {name:'?'}).name;
const CATS = ['餐饮','住宿','交通','门票','购物','其他'];
const CURS = ['MYR','JPY','USD','CNY','SGD'];
const KIND_ARR = { member:'members', expense:'expenses', stop:'stops', settlement:'settlements' };

function mainPayer(e, memberSet) {
  let best = null;
  for (const [id, c] of Object.entries(e.payers))
    if (id in memberSet && (best === null || c > e.payers[best])) best = id;
  return best;
}
function expenseShares(e, memberSet) {
  const ids = e.participantIds.filter(id => id in memberSet);
  const payer = mainPayer(e, memberSet);
  if (!ids.length || payer === null) return null;
  const sp = e.split || { type: 'equal' };
  const shares = {};
  if (sp.type === 'amount') {
    ids.forEach(id => shares[id] = Math.round((sp.values[id] || 0) * e.rate * 100));
  } else {
    const w = id => sp.type === 'shares' ? (sp.values[id] || 0) : 1;
    const W = ids.reduce((s, id) => s + w(id), 0) || 1;
    ids.forEach(id => shares[id] = Math.floor(e.mainCents * w(id) / W));
  }
  const rem = e.mainCents - Object.values(shares).reduce((s, x) => s + x, 0);
  shares[payer] = (shares[payer] || 0) + rem;
  return shares;
}
function computeBalances(t) {
  const bal = {};
  t.members.forEach(m => bal[m.id] = 0);
  for (const e of t.expenses) {
    const shares = expenseShares(e, bal);
    if (!shares) continue;
    for (const [id, c] of Object.entries(e.payers)) if (id in bal) bal[id] += c;
    for (const [id, c] of Object.entries(shares)) bal[id] -= c;
  }
  for (const s of (t.settlements || [])) { bal[s.from] += s.cents; bal[s.to] -= s.cents; }
  return bal;
}
function settleUp(bal) {
  const arr = Object.entries(bal).map(([id, c]) => ({id, c}));
  const out = [];
  while (true) {
    arr.sort((a, b) => b.c - a.c);
    const cred = arr[0], debt = arr[arr.length - 1];
    if (!cred || cred.c <= 0 || debt.c >= 0) break;
    const amt = Math.min(cred.c, -debt.c);
    out.push({ from: debt.id, to: cred.id, cents: amt });
    cred.c -= amt; debt.c += amt;
  }
  return out;
}
function transferDetail(t, from, to) {
  const set = {}; t.members.forEach(m => set[m.id] = 0);
  const lines = []; let sum = 0;
  for (const e of t.expenses) {
    if (!(to in e.payers)) continue;
    const sh = expenseShares(e, set);
    if (!sh || !sh[from] || from in e.payers) continue;
    const part = Math.round(sh[from] * e.payers[to] / e.mainCents);
    if (!part) continue;
    lines.push({ desc:e.desc, cents:part });
    sum += part;
  }
  return { lines, sum };
}
(function selfTest() {
  const t = { members:[{id:'A'},{id:'B'},{id:'C'}], settlements:[], expenses:[
    { payers:{A: 90000}, participantIds:['A','C'],     mainCents: 90000, desc:'晚餐' },
    { payers:{C:120000}, participantIds:['A','B','C'], mainCents:120000, desc:'民宿' },
    { payers:{B: 27900}, participantIds:['A','B','C'], mainCents: 27900, desc:'车票' }]};
  const b = computeBalances(t);
  console.assert(b.A === -4300 && b.B === -21400 && b.C === 25700, '余额算错', b);
  console.assert(Object.values(b).reduce((s,x) => s+x, 0) === 0, '余额之和≠0', b);
  const tr = settleUp(b);
  console.assert(tr.length === 2 && tr.every(x => x.to === 'C'), '结算建议算错', tr);
  const d = transferDetail(t, 'B', 'C');
  console.assert(d.lines.length === 1 && d.sum === 40000, '转账明细算错', d);
  const local = [{id:'x', members:[], expenses:[], v:1}];
  const r = mergeTrips(local, [{id:'x', members:[], expenses:[], v:2}, {id:'y', members:[], expenses:[]}, {bad:true}]);
  console.assert(r.added === 1 && r.replaced === 1 && local.length === 2 && local.find(t2 => t2.id === 'x').v === 2, '导入合并算错', local);

  // 任务1:无关联记录的成员可删除;有关联的不可删
  const tm1 = { members:[{id:'A'},{id:'B'}], expenses:[], settlements:[] };
  console.assert(delMemberSafe(tm1, 'B') === true && tm1.members.length === 1, '空成员应可删除', tm1);
  const tm2 = { members:[{id:'A'},{id:'B'}], expenses:[{payerId:'A', participantIds:['A','B']}], settlements:[] };
  console.assert(delMemberSafe(tm2, 'B') === false && tm2.members.length === 2, '有关联记录不应删除', tm2);

  // 付款人不在参与人里:A 垫 100.00,B、C 分摊
  const b1 = computeBalances({ members:[{id:'A'},{id:'B'},{id:'C'}], settlements:[], expenses:[
    { payers:{A:10000}, participantIds:['B','C'], mainCents:10000 }]});
  console.assert(b1.A === 10000 && b1.B === -5000 && b1.C === -5000, '付款人不参与算错', b1);
  // 按份数有余数:100.00 按 2:1 分,余 1 分由付款人 A 吸收(A 摊 66.67)
  const b2 = computeBalances({ members:[{id:'A'},{id:'B'}], settlements:[], expenses:[
    { payers:{A:10000}, participantIds:['A','B'], mainCents:10000, split:{type:'shares', values:{A:2,B:1}} }]});
  console.assert(b2.A === 3333 && b2.B === -3333 && b2.A + b2.B === 0, '按份数余数算错', b2);
  // 外币按金额:各 50 JPY × 汇率 0.0333,各自四舍五入到 167 分,合计比总额多 1 分,差额由付款人吸收
  const b3 = computeBalances({ members:[{id:'A'},{id:'B'}], settlements:[], expenses:[
    { payers:{A:333}, participantIds:['A','B'], mainCents:333, rate:0.0333, split:{type:'amount', values:{A:50,B:50}} }]});
  console.assert(b3.A === 167 && b3.B === -167 && b3.A + b3.B === 0, '外币按金额四舍五入算错', b3);
  // 标记已还后余额归零、不再出结算建议
  const b4 = computeBalances({ members:[{id:'A'},{id:'B'}], settlements:[{from:'B',to:'A',cents:5000}], expenses:[
    { payers:{A:10000}, participantIds:['A','B'], mainCents:10000 }]});
  console.assert(b4.A === 0 && b4.B === 0 && !settleUp(b4).length, '标记已还后未归零', b4);
  // 任务2:多人合付 房费 1000.00,A 付 600 B 付 400,三人平分(余 1 分由出资最多的 A 吸收)
  const b6 = computeBalances({ members:[{id:'A'},{id:'B'},{id:'C'}], settlements:[], expenses:[
    { payers:{A:60000,B:40000}, participantIds:['A','B','C'], mainCents:100000 }]});
  console.assert(b6.A === 26666 && b6.B === 6667 && b6.C === -33333, '多人合付余额算错', b6);
  console.assert(b6.A + b6.B + b6.C === 0, '多人合付余额和应为0', b6);
  // 任务2:旧数据迁移 payerId → payers
  const mdb = { trips:[{ expenses:[{ payerId:'A', mainCents:100 }] }] };
  migratePayers(mdb);
  console.assert(mdb.trips[0].expenses[0].payers.A === 100 && !('payerId' in mdb.trips[0].expenses[0]), '旧数据迁移算错', mdb);

  // V2:存量结算记录补 id
  const midb = { trips:[{ expenses:[], settlements:[{from:'A',to:'B',cents:1}] }] };
  migrateIds(midb);
  console.assert(!!midb.trips[0].settlements[0].id, '结算迁移未补 id', midb);
  // V2:行程拆记录(trip 元信息一条,剔除本机偏好 last)/差异/墓碑/远端合并
  const ts = { id:'T', name:'旅', currency:'MYR', last:{payerId:'A'},
    members:[{id:'A',name:'安'}], expenses:[{id:'e1', payers:{A:100}, participantIds:['A'], mainCents:100}],
    stops:[], settlements:[] };
  const recs = tripToRecords(ts);

function tripToRecords(t) {
  const recs = [{ id:'trip', kind:'trip', data:{ name:t.name, currency:t.currency } }];
  const add = (kind, list) => (list || []).forEach(x => recs.push({ id:x.id, kind, data:x }));
  add('member', t.members); add('expense', t.expenses); add('stop', t.stops); add('settlement', t.settlements);

function diffRecords(snap, t) {
  const out = [], seen = {};
  for (const r of tripToRecords(t)) {
    seen[r.id] = true;
    if (snap[r.id] !== JSON.stringify(r.data)) out.push({ ...r, deleted:false });
  }
  for (const id of Object.keys(snap)) if (!seen[id]) out.push({ id, kind:'', data:{}, deleted:true });
  return out;
}
function applyRemote(t, rec) {
  if (rec.kind === 'trip') {
    if (rec.deleted || (t.name === rec.data.name && t.currency === rec.data.currency)) return false;
    t.name = rec.data.name; t.currency = rec.data.currency;
    return true;
  }
  if (rec.deleted) {
    let hit = false;
    for (const k of Object.values(KIND_ARR)) {
      const a = t[k] || [], i = a.findIndex(x => x.id === rec.id);
      if (i >= 0) { a.splice(i, 1); hit = true; }
    }
    return hit;
  }
  const a = t[KIND_ARR[rec.kind]] = t[KIND_ARR[rec.kind]] || [];
  const i = a.findIndex(x => x.id === rec.id);
  if (i >= 0) {
    if (JSON.stringify(a[i]) === JSON.stringify(rec.data)) return false;
    a[i] = rec.data;
  } else a.push(rec.data);
  return true;
}

  if (!diffs.length) return;
  const now = new Date().toISOString();
  for (const r of diffs) {
    sync.outbox = sync.outbox.filter(o => !(o.trip_id === t.id && o.id === r.id));
    sync.outbox.push({ trip_id:t.id, id:r.id, kind:r.kind, data:r.data, updated_at:now, deleted:r.deleted });
    if (r.deleted) delete snap[r.id]; else snap[r.id] = JSON.stringify(r.data);
  }
  saveSync();
  flush();
}

    if (!(await ensureAuth())) return;

    const { error } = await supa.from('records').upsert(batch);

    if (applyRemote(t, rec)) changed = true;
    if (rec.deleted) delete snap[rec.id]; else snap[rec.id] = JSON.stringify(rec.data);
    if (rec.updated_at > (sync.lastPulled[tid] || '')) sync.lastPulled[tid] = rec.updated_at;

function statRows(pairs, unit) {
  const max = Math.max(...pairs.map(p => p[1]), 1);
  return pairs.map(([l, c]) => `<div class="stat"><span class="sl">${esc(l)}</span><div class="bar"><i style="width:${(c / max * 100).toFixed(1)}%"></i></div><span class="sv2 num">${unit} ${fmt(c)}</span></div>`).join('');
}

function renderSettle(t) {
  if (!t.members.length) return '<p class="muted">先加成员。</p>';
  const bal = computeBalances(t);
  const plan = settleUp(bal);
  const settled = !plan.length && t.expenses.length;
  const ids = {}; t.members.forEach(m => ids[m.id] = 0);
  const spend = {...ids}, paid = {...ids};
  for (const e of t.expenses) {
    const shares = expenseShares(e, ids);
    if (!shares) continue;
    for (const [id, c] of Object.entries(e.payers)) if (id in paid) paid[id] += c;
    for (const [id, c] of Object.entries(shares)) spend[id] += c;
  }
  const by = key => { const g = {}; t.expenses.forEach(e => g[key(e)] = (g[key(e)] || 0) + e.mainCents); return Object.entries(g); };
  return `
  <div class="s2-title">${settled ? '圆满收官' : '回国前，理清这本账'}</div>
  <div class="s2-sub">${settled ? '<span class="stamp">已结清</span>' : `尚有 ${plan.length} 笔转账，即可结清`}</div>
  ${t.members.map(m => lr(esc(m.name), `${bal[m.id] >= 0 ? '+' : ''}${fmt(bal[m.id])}`,
    `num ${bal[m.id] > 0 ? 'pos' : bal[m.id] < 0 ? 'neg' : ''}`)).map(x => `<div class="balance-row">${x}</div>`).join('')}
  ${plan.length ? `<h2>转账建议 · 最少 ${plan.length} 笔</h2>
  <p class="muted" style="font-size:12.5px;margin-bottom:6px">先算出每人净余额，再用最少的转账笔数互相抵扣——所以每笔转账不一定对应某一张小票，明细仅列直接相关的账。</p>` : ''}
  ${plan.map(p => {
    const d = transferDetail(t, p.from, p.to);
    return `<div class="transfer">
      <div class="t-row route"><span>${esc(mname(t,p.from))}</span><span class="arrow">→</span><span>${esc(mname(t,p.to))}</span><span class="t-amt">${t.currency} ${fmt(p.cents)}</span></div>
      ${d.lines.length ? `<details class="t-detail">
        <summary>查看明细 · ${d.lines.length} 笔</summary>
        <div class="detail-line">${d.lines.map(x => lr(esc(x.desc), fmt(x.cents))).join('')}
        ${d.sum !== p.cents ? `<div style="margin-top:6px">经多人互相抵扣后为 ${t.currency} ${fmt(p.cents)}</div>` : ''}</div>
      </details>` : `<div class="detail-line">由多人债务互相抵扣而来</div>`}
      <div class="t-actions"><button class="outline" onclick="markPaid('${p.from}','${p.to}',${p.cents})">标记已还</button></div>
    </div>`;
  }).join('')}
  ${t.expenses.length ? `
  <h2>钱花哪儿了</h2>
  <details class="section" open><summary>按类别<span></span></summary><div>${statRows(by(e => e.cat).sort((a, b) => b[1] - a[1]), t.currency)}</div></details>
  <details class="section"><summary>按天<span></span></summary><div>${statRows(by(e => e.date).sort((a, b) => a[0].localeCompare(b[0])), t.currency)}</div></details>
  <details class="section"><summary>按人 · 应摊消费<span></span></summary><div>${statRows(t.members.map(m => [m.name, spend[m.id]]).sort((a, b) => b[1] - a[1]), t.currency)}</div></details>
  <details class="section"><summary>按人 · 垫付<span></span></summary><div>${statRows(t.members.map(m => [m.name, paid[m.id]]).sort((a, b) => b[1] - a[1]), t.currency)}</div></details>
  <button class="outline" style="width:100%;margin-top:26px" onclick="openRecap()">生成回忆卡</button>` : ''}
  ${(t.settlements || []).length ? `<h2>已还记录</h2>${t.settlements.map(s =>
    `<div class="exp-row"><span class="who">${s.date} ${esc(mname(t,s.from))} → ${esc(mname(t,s.to))}</span><span class="num">${t.currency} ${fmt(s.cents)}</span></div>`).join('')}` : ''}`;
}

function recapOverlay() {
  const t = trip(), s = recapStats(t);
  return `<div class="overlay" onclick="if(event.target===this)closeRecap()">
    <div class="recap-card">
      <div class="recap-title">${esc(t.name)}</div>
      <div class="recap-sub">${s.range}</div>
      <div class="recap-rule"></div>
      <div class="recap-stats">
        <div class="stat-box"><div class="stat-num">${s.days}</div><div class="stat-lb">天</div></div>
        <div class="stat-box"><div class="stat-num">${t.expenses.length}</div><div class="stat-lb">笔支出</div></div>
        <div class="stat-box"><div class="stat-num">${(t.stops || []).length}</div><div class="stat-lb">地点</div></div>
      </div>
      <div class="recap-total">总花费<b>${t.currency} ${fmt(s.total)}</b></div>
      <div class="recap-facts">${s.facts.map(f => `<div class="recap-fact">${esc(f)}</div>`).join('')}</div>
      ${s.settled ? '<div class="recap-stamp">已结清</div>' : ''}
    </div>
    <canvas id="recap"></canvas>
    <div class="row" style="flex:0 0 auto">
      <button class="cta" style="width:auto;background:#fff;color:#1B1B16" onclick="saveRecap()">保存分享卡片</button>
      <button class="outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="closeRecap()">关闭</button>
    </div>
  </div>`;
}
function recapStats(t) {
  const dates = [...t.expenses.map(e => e.date), ...(t.stops || []).map(s => s.date)].filter(Boolean).sort();
  const days = dates.length ? Math.round((new Date(dates[dates.length-1]) - new Date(dates[0])) / 864e5) + 1 : 0;
  const total = t.expenses.reduce((s,e) => s + e.mainCents, 0);
  const top = obj => Object.entries(obj).sort((a,b) => b[1] - a[1])[0];
  const byDay = {}, byCat = {}, paid = {};
  t.expenses.forEach(e => {
    byDay[e.date] = (byDay[e.date] || 0) + e.mainCents;
    byCat[e.cat]  = (byCat[e.cat]  || 0) + e.mainCents;
    Object.entries(e.payers).forEach(([id, c]) => { const n = mname(t, id); paid[n] = (paid[n] || 0) + c; });
  });
  const fd = d => `${+d.slice(5,7)}.${+d.slice(8,10)}`;
  return {
    range: dates.length ? `${dates[0].slice(0,4)}.${fd(dates[0])} – ${fd(dates[dates.length-1])}` : '',
    days, total,
    facts: t.expenses.length ? [
      `花费最高的一天 · ${+top(byDay)[0].slice(5,7)}/${+top(byDay)[0].slice(8,10)}(${t.currency} ${fmt(top(byDay)[1])})`,
      `花得最多的类别 · ${top(byCat)[0]}`,
      `垫付最多 · ${top(paid)[0]}，记得谢谢 TA`,
    ] : [],
    settled: !settleUp(computeBalances(t)).length && t.expenses.length > 0,
  };
}
function drawRecap() {
  const t = trip(), s = recapStats(t);
  const c = document.getElementById('recap'), x = c.getContext('2d');
  const W = 360, H = 540, S = 2;
  c.width = W*S; c.height = H*S; x.scale(S, S);
  const sans = '-apple-system,system-ui,"PingFang SC","Microsoft YaHei",sans-serif';
  const serif = 'Georgia,"Songti SC",serif';
  const g = x.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, '#232019'); g.addColorStop(1, '#171512');
  x.fillStyle = g; x.fillRect(0, 0, W, H);
  x.fillStyle = '#fff'; x.font = 'italic 700 25px ' + serif; x.fillText(t.name, 30, 64);
  x.fillStyle = '#B8A98A'; x.font = '600 11px ' + sans; x.textBaseline = 'alphabetic';
  x.fillText(s.range.toUpperCase(), 30, 86);
  x.strokeStyle = '#8A6B3E'; x.globalAlpha = .6; x.lineWidth = 1;

  });

  }
  x.fillStyle = '#6B6455'; x.font = '500 9px ' + sans; x.textAlign = 'center';
  x.fillText('旅行分账', W/2, H-16); x.textAlign = 'left';
}
